        @media (max-width: 768px) {
            /* 让 header 内部的块元素允许自动换行，不再强行挤在一行 */
            .app__header {
                display: flex !important;
                flex-wrap: wrap !important; 
                flex-direction: row !important;
                align-items: flex-start !important;
                margin-bottom: 24px !important;
            }

            /* 图标包裹层：强制限制宽度并保持与右边文字的间距 */
            .app__logo-wrapper {
                max-width: 120px !important;
                max-height: 120px !important;
                width: 120px !important;
                height: 120px !important;
                margin-right: 24px !important;
                margin-bottom: 5px !important; /* 留出下方按钮的间距 */
            }

            /* 右侧文字包裹层：通过占满剩余宽度，使其和图标并排 */
            .app__infos {
                flex: 1 !important;
                min-width: 180px !important;
            }

            /* 移动端专属下载按钮：利用 width: 100% 强行换行，精准掉落到图标的正下方 */
            .mobile-btn-container {
                display: flex !important;
                width: 100% !important; /* 强制它另起一行，出现在最下方 */
                justify-content: flex-start !important; /* 靠左对齐 */

                padding-left: 0 !important;
            }

            .mobile-btn-container .app__buttons {

                margin-bottom: 0 !important;
            }
        }

        .app__section {
            margin-bottom: 40px !important;
        }
        @media (max-width: 768px) {
            .app__section {
                margin-bottom: 24px !important;
            }
            .app__screenshots-list {
                padding: 12px 24px !important;
            }
        }
    </style>
</head>
